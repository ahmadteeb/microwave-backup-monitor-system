<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to MW Backup Link Monitor System — Secure access to real-time microwave link monitoring and NOC operations dashboard.">
  <title>Login - MW Backup Link Monitor System</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">
          <i class="fa-solid fa-network-wired"></i>
        </div>
        <h1 class="auth-title">MW BACKUP LINK MONITOR</h1>
        <p class="auth-subtitle">SYSTEM ACCESS CONTROL</p>
      </div>

      <form id="login-form" class="auth-form">
        <div class="form-group">
          <label class="form-label">USERNAME</label>
          <input type="text" id="username" class="form-control text-mono" required>
        </div>

        <div class="form-group">
          <label class="form-label">PASSWORD</label>
          <input type="password" id="password" class="form-control text-mono" required>
        </div>

        <div id="error-message" class="auth-error hidden">
          <i class="fa-solid fa-triangle-exclamation"></i>
          <span id="error-text"></span>
        </div>

        <button type="submit" class="auth-btn">
          <i class="fa-solid fa-right-to-bracket"></i>
          AUTHENTICATE
        </button>
      </form>

      <div class="auth-footer">
        <div class="auth-info">
          <i class="fa-solid fa-shield-halved"></i>
          SECURE CONNECTION ESTABLISHED
        </div>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/dialog.js') }}"></script>
  <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
