<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: #1a202c; color: white; padding: 15px 20px; text-align: center; border-radius: 5px 5px 0 0; }
        .content { padding: 20px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 0 0 5px 5px; }
        .alert-UP { border-left: 4px solid #48bb78; }
        .alert-DOWN { border-left: 4px solid #f56565; }
        .alert-FLAPPING { border-left: 4px solid #ed8936; }
        .event-details { background: white; padding: 15px; margin-top: 15px; border-radius: 4px; }
        h2 { margin-top: 0; }
        .footer { margin-top: 20px; font-size: 12px; color: #718096; text-align: center; }
    </style>
</head>
<body>
    <div class="header">
        <h2>MW Monitor Alert</h2>
    </div>
    <div class="content alert-{{ event_type }}">
        <h3>Link {{ event_type }}</h3>
        <p>{{ message }}</p>
        
        <div class="event-details">
            <p><strong>Link ID:</strong> {{ link.link_id }}</p>
            <p><strong>Leg Name:</strong> {{ link.leg_name }}</p>
            <p><strong>Site A:</strong> {{ link.site_a or 'N/A' }}</p>
            <p><strong>Site B:</strong> {{ link.site_b or 'N/A' }}</p>
            <p><strong>Time:</strong> {{ timestamp }}</p>
        </div>
    </div>
    <div class="footer">
        <p>This is an automated message from the MW Backup Link Monitor System.</p>
    </div>
</body>
</html>
