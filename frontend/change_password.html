<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Change your password for MW Backup Link Monitor System — Update security credentials securely.">
  <title>Change Password - MW Backup Link Monitor System</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">
          <i class="fa-solid fa-key"></i>
        </div>
        <h1 class="auth-title">CHANGE PASSWORD</h1>
        <p class="auth-subtitle">UPDATE SECURITY CREDENTIALS</p>
      </div>

      <form id="change-password-form" class="auth-form">
        <div class="form-group">
          <label class="form-label">CURRENT PASSWORD</label>
          <input type="password" id="current-password" class="form-control text-mono" required>
        </div>

        <div class="form-group">
          <label class="form-label">NEW PASSWORD</label>
          <input type="password" id="new-password" class="form-control text-mono" required>
          <div class="form-helper">Minimum 8 characters, include numbers and symbols</div>
        </div>

        <div class="form-group">
          <label class="form-label">CONFIRM NEW PASSWORD</label>
          <input type="password" id="confirm-password" class="form-control text-mono" required>
        </div>

        <div id="error-message" class="auth-error hidden">
          <i class="fa-solid fa-triangle-exclamation"></i>
          <span id="error-text"></span>
        </div>

        <div id="success-message" class="auth-success hidden">
          <i class="fa-solid fa-check-circle"></i>
          <span>Password changed successfully. Redirecting...</span>
        </div>

        <button type="submit" class="auth-btn">
          <i class="fa-solid fa-save"></i>
          UPDATE PASSWORD
        </button>

        <div class="auth-links">
          <a href="/" class="auth-link">
            <i class="fa-solid fa-arrow-left"></i>
            BACK TO DASHBOARD
          </a>
        </div>
      </form>

      <div class="auth-footer">
        <div class="auth-info">
          <i class="fa-solid fa-shield-halved"></i>
          SECURE PASSWORD UPDATE
        </div>
      </div>
    </div>
  </div>

  <script src="/js/dialog.js"></script>
  <script src="/js/change-password.js"></script>
</body>
</html>
